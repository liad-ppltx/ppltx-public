<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Floating Island Slot Lab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      :root {
        --bg-ocean-top: #050819;
        --bg-ocean-mid: #020b32;
        --bg-ocean-bottom: #000714;
        --sky-glow: rgba(122, 182, 255, 0.4);

        --stone-dark: #1b1f2a;
        --stone-mid: #2b323f;
        --stone-light: #3a4457;
        --iron: #818897;

        --wood-light: #f2c27b;
        --wood-mid: #b47633;
        --wood-dark: #6a3a16;

        --gold-light: #ffe6a3;
        --gold-mid: #ffd166;
        --gold-dark: #b8860b;

        --mana-blue: #4fd3ff;
        --void-1: #160826;
        --void-2: #070212;
        --metal-1: #2a2f3a;
        --metal-2: #12141b;
        --metal-edge: rgba(255, 255, 255, 0.14);
        --rivet: radial-gradient(circle at 30% 30%, #f2f5ff, #747c8f 60%, #0b0d14 100%);
        --beam-energy: linear-gradient(90deg, #4df0ff, #2be9b1 55%, #4df0ff);
        --beam-coins: linear-gradient(90deg, #ffd166, #ff7d00 55%, #ffd166);

        --text-main: #fdfdfd;
        --text-subtle: #d1d6ea;
        --danger: #ff4f7b;
        --success: #64f5c2;

        --bezier-snap: cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: var(--text-main);
        background:
          radial-gradient(circle at 30% 0%, rgba(120, 190, 255, 0.35), transparent 55%),
          radial-gradient(circle at 70% 10%, rgba(60, 120, 255, 0.25), transparent 60%),
          linear-gradient(180deg, #02102c, #000814 60%, #00030a);
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: -40%;
        background-image:
          radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.04), transparent 65%),
          radial-gradient(circle at 80% 30%, rgba(255, 255, 255, 0.03), transparent 60%),
          radial-gradient(circle at 30% 80%, rgba(255, 255, 255, 0.035), transparent 70%);
        opacity: 0.9;
        mix-blend-mode: screen;
        pointer-events: none;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(
            135deg,
            rgba(255, 255, 255, 0.03) 0,
            transparent 40%,
            rgba(255, 255, 255, 0.035) 60%,
            transparent 100%
          );
        opacity: 0.7;
        mix-blend-mode: soft-light;
        pointer-events: none;
      }

      .ocean-waves {
        position: fixed;
        inset: 0;
        background-image:
          repeating-linear-gradient(
            -10deg,
            rgba(255, 255, 255, 0.06) 0 2px,
            transparent 2px 18px
          ),
          repeating-linear-gradient(
            10deg,
            rgba(255, 255, 255, 0.03) 0 2px,
            transparent 2px 24px
          );
        opacity: 0.22;
        mix-blend-mode: soft-light;
        animation: waves-shift 38s linear infinite;
        pointer-events: none;
      }

      @keyframes waves-shift {
        0% {
          transform: translate3d(0, 0, 0);
        }
        100% {
          transform: translate3d(-160px, 40px, 0);
        }
      }

      .phone-frame {
        position: relative;
        width: min(420px, 100vw - 32px);
        min-height: min(820px, 100vh - 32px);
        max-height: 840px;
        padding: 14px 12px 90px;
        border-radius: 32px;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.14), transparent 65%),
          radial-gradient(circle at bottom, rgba(0, 0, 0, 0.9), transparent 60%),
          linear-gradient(145deg, #16192a, #050612);
        box-shadow:
          0 40px 110px rgba(0, 0, 0, 0.9),
          0 0 0 2px rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.16);
        display: flex;
        flex-direction: column;
        gap: 10px;
        backdrop-filter: blur(14px);
        overflow: hidden;
      }

      .phone-bezel-notch {
        position: absolute;
        top: 10px;
        left: 50%;
        width: 84px;
        height: 10px;
        border-radius: 999px;
        transform: translateX(-50%);
        background: radial-gradient(circle at top, #4a4f5c, #161821);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.8);
      }

      .hud {
        /* Carved dark wood + polished glass inlay */
        background:
          radial-gradient(circle at 20% 0%, rgba(255, 255, 255, 0.10), transparent 55%),
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.05) 0 8px,
            rgba(0, 0, 0, 0.10) 8px 18px
          ),
          linear-gradient(180deg, #2a160c, #120805);
        border-radius: 20px;
        padding: 10px 11px 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.8),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        position: relative;
      }

      .hud::before {
        content: "";
        position: absolute;
        inset: 8px;
        border-radius: 14px;
        background:
          radial-gradient(circle at 30% 20%, rgba(120, 210, 255, 0.18), transparent 60%),
          radial-gradient(circle at 70% 30%, rgba(255, 209, 102, 0.12), transparent 65%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(0, 0, 0, 0.38));
        border: 1px solid rgba(160, 200, 255, 0.14);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          inset 0 -14px 20px rgba(0, 0, 0, 0.45);
        opacity: 0.85;
        pointer-events: none;
      }

      .hud::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 20px;
        background:
          radial-gradient(circle at 10% 20%, rgba(255,255,255,0.12), transparent 55%),
          radial-gradient(circle at 90% 70%, rgba(255,255,255,0.08), transparent 60%);
        pointer-events: none;
        opacity: 0.35;
        mix-blend-mode: screen;
      }

      /* Exactly TWO symmetric rivets on HUD corners */
      .hud-rivet {
        position: absolute;
        top: 8px;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background:
          radial-gradient(circle at 30% 30%, #ffffff, #b8c1d6 55%, #3a4153 100%);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.55),
          0 6px 12px rgba(0,0,0,0.65);
        z-index: 2;
        pointer-events: none;
      }

      .hud-rivet--tl { left: 10px; }
      .hud-rivet--tr { right: 10px; }

      .hud > * {
        position: relative;
        z-index: 1;
      }

      .hud-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .hud-title {
        font-size: 0.92rem;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--text-subtle);
      }

      .hud-level {
        font-weight: 700;
        color: var(--gold-light);
      }

      .hud-bars {
        display: grid;
        gap: 10px;
      }

      .hud-bar {
        display: grid;
        grid-template-columns: 60px 1fr auto;
        gap: 8px;
        align-items: center;
      }

      .hud-bar-label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-subtle);
      }

      .hud-bar-track {
        height: 10px;
        border-radius: 999px;
        background:
          radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.14), transparent 60%),
          linear-gradient(180deg, rgba(10, 12, 18, 0.92), rgba(0, 0, 0, 0.92));
        border: 1px solid rgba(255, 255, 255, 0.14);
        overflow: hidden;
      }

      .hud-bar-track::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 999px;
        pointer-events: none;
        background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.10), transparent 60%);
      }

      .hud-bar-fill {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        transition: width 220ms var(--bezier-snap);
      }

      .hud-bar-fill.energy {
        background:
          radial-gradient(circle at 30% 50%, rgba(255,255,255,0.32), transparent 55%),
          repeating-linear-gradient(90deg, rgba(255,255,255,0.14) 0 6px, rgba(0,0,0,0.10) 6px 14px),
          var(--beam-energy);
        box-shadow: 0 0 18px rgba(79, 211, 255, 0.55);
      }

      .hud-bar-fill.coins {
        background:
          radial-gradient(circle at 30% 50%, rgba(255,255,255,0.26), transparent 55%),
          repeating-linear-gradient(90deg, rgba(255,255,255,0.12) 0 6px, rgba(0,0,0,0.10) 6px 14px),
          var(--beam-coins);
        box-shadow: 0 0 18px rgba(255, 177, 60, 0.45);
      }

      .hud-bar-value {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
      }

      .world {
        flex: 1;
        display: flex;
        align-items: stretch;
      }

      .world-inner {
        position: relative;
        width: 100%;
        border-radius: 26px;
        background:
          radial-gradient(circle at 30% 10%, rgba(181, 23, 255, 0.25), transparent 60%),
          radial-gradient(circle at 70% 20%, rgba(79, 211, 255, 0.12), transparent 65%),
          linear-gradient(180deg, rgba(22, 6, 32, 0.98), rgba(6, 2, 18, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow:
          0 28px 80px rgba(0, 0, 0, 0.9),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        overflow: hidden;
        padding: 14px 10px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .world-sky {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.55;
      }

      .world-sky::before,
      .world-sky::after {
        content: "";
        position: absolute;
        width: 260%;
        height: 160%;
        background-image:
          radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.12), transparent 60%),
          radial-gradient(circle at 80% 30%, rgba(255, 255, 255, 0.08), transparent 60%),
          radial-gradient(circle at 30% 80%, rgba(255, 255, 255, 0.09), transparent 65%);
        filter: blur(18px);
      }

      .world-sky::before {
        top: -30%;
        left: -20%;
        opacity: 0.35;
        animation: clouds-drift-1 80s linear infinite;
      }

      .world-sky::after {
        top: -40%;
        left: -10%;
        opacity: 0.25;
        animation: clouds-drift-2 110s linear infinite;
      }

      @keyframes clouds-drift-1 {
        0% {
          transform: translate3d(0, 0, 0);
        }
        100% {
          transform: translate3d(-200px, 40px, 0);
        }
      }

      @keyframes clouds-drift-2 {
        0% {
          transform: translate3d(0, 0, 0);
        }
        100% {
          transform: translate3d(180px, 60px, 0);
        }
      }

      .island {
        position: relative;
        width: min(320px, 80vw);
        height: 210px;
        margin: 18px auto 10px;
        transform: perspective(900px) rotateX(16deg);
        transform-origin: center top;
      }

      .island-top {
        position: absolute;
        left: 50%;
        top: 0;
        width: 100%;
        height: 110px;
        transform: translateX(-50%);
        border-radius: 60% 60% 40% 40%;
        background:
          radial-gradient(circle at 30% 20%, rgba(255,255,255,0.20), transparent 55%),
          radial-gradient(circle at 70% 30%, rgba(79,211,255,0.20), transparent 55%),
          radial-gradient(circle at 50% 70%, rgba(40, 140, 55, 1), rgba(12, 62, 22, 1) 72%),
          repeating-radial-gradient(circle at 20% 30%, rgba(0,0,0,0.10) 0 1px, transparent 1px 7px),
          repeating-radial-gradient(circle at 80% 70%, rgba(255,255,255,0.06) 0 1px, transparent 1px 9px);
        box-shadow:
          inset 0 0 0 2px rgba(255, 255, 255, 0.2),
          inset 0 18px 30px rgba(255, 255, 255, 0.18),
          0 14px 20px rgba(0, 0, 0, 0.75);
        overflow: hidden;
      }

      .island-top::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.15), transparent 55%),
          radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.1), transparent 60%),
          radial-gradient(circle at 40% 80%, rgba(0, 0, 0, 0.12), transparent 70%);
        mix-blend-mode: soft-light;
        opacity: 0.8;
      }

      .island-side {
        position: absolute;
        left: 50%;
        top: 90px;
        width: 100%;
        height: 80px;
        transform: translateX(-50%);
        border-radius: 50% / 80%;
        background:
          radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent 60%),
          repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0 10px, rgba(0,0,0,0.10) 10px 22px),
          linear-gradient(180deg, rgba(110, 68, 38, 1), rgba(64, 36, 18, 1) 45%, rgba(20, 12, 10, 1));
        box-shadow:
          inset 0 10px 18px rgba(255, 255, 255, 0.06),
          0 22px 40px rgba(0, 0, 0, 0.95);
      }

      .island-side::before {
        content: "";
        position: absolute;
        inset: 8px 16px 14px;
        background-image: radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.1), transparent 60%),
          radial-gradient(circle at 70% 90%, rgba(0, 0, 0, 0.35), transparent 60%);
        opacity: 0.6;
      }

      .island-shadow {
        position: absolute;
        left: 50%;
        bottom: -18px;
        width: 70%;
        height: 20px;
        transform: translateX(-50%);
        border-radius: 999px;
        background: radial-gradient(circle at center, rgba(0, 0, 0, 0.8), transparent 70%);
        filter: blur(2px);
        opacity: 0.9;
      }

      .castle-wrap {
        position: absolute;
        left: 50%;
        top: 12px;
        width: 76%;
        height: 160px;
        transform: translateX(-50%) translateZ(0);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .castle {
        position: relative;
        width: 90%;
        height: 100%;
        transform: translateZ(0);
        filter: drop-shadow(0 18px 22px rgba(0, 0, 0, 0.75));
        transition: transform 260ms var(--bezier-snap), filter 260ms var(--bezier-snap);
      }

      .castle * {
        position: absolute;
        box-sizing: border-box;
      }

      .castle__shadow {
        left: 50%;
        bottom: 4px;
        width: 70%;
        height: 14px;
        transform: translateX(-50%);
        border-radius: 999px;
        background: radial-gradient(circle at center, rgba(0, 0, 0, 0.7), transparent 65%);
      }

      .castle__moat {
        left: 50%;
        bottom: -6px;
        width: 90%;
        height: 26px;
        transform: translateX(-50%);
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(67, 199, 255, 0.28), rgba(18, 78, 140, 0.16));
        border: 1px solid rgba(87, 215, 255, 0.5);
        box-shadow: 0 0 0 rgba(87, 215, 255, 0.0);
        opacity: 0;
        transition: opacity 260ms var(--bezier-snap), box-shadow 260ms var(--bezier-snap);
      }

      .castle__base {
        left: 50%;
        bottom: 18px;
        width: 72%;
        height: 90px;
        transform: translateX(-50%);
        border-radius: 18px;
        background: linear-gradient(180deg, #b17b48, #5f3417);
        border: 2px solid rgba(0, 0, 0, 0.55);
        box-shadow:
          inset 0 10px 20px rgba(255, 255, 255, 0.12),
          inset 0 -14px 20px rgba(0, 0, 0, 0.5);
      }

      .castle__roof {
        left: 50%;
        bottom: 102px;
        width: 0;
        height: 0;
        transform: translateX(-50%);
        border-left: 70px solid transparent;
        border-right: 70px solid transparent;
        border-bottom: 42px solid #ad7b3b;
        filter: drop-shadow(0 10px 16px rgba(0, 0, 0, 0.4));
      }

      .castle__roof::after {
        content: "";
        position: absolute;
        inset: -2px -52px;
        background: repeating-linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.16) 0 6px,
          rgba(0, 0, 0, 0.12) 6px 12px
        );
        mix-blend-mode: soft-light;
        opacity: 0.35;
      }

      .castle__door {
        left: 50%;
        bottom: 18px;
        width: 48px;
        height: 60px;
        transform: translateX(-50%);
        border-radius: 18px 18px 8px 8px;
        background: linear-gradient(180deg, #2b150b, #130906);
        border: 2px solid rgba(0, 0, 0, 0.75);
        box-shadow:
          inset 0 10px 16px rgba(255, 255, 255, 0.12),
          0 6px 12px rgba(0, 0, 0, 0.6);
        opacity: 0;
        transition: opacity 220ms var(--bezier-snap);
      }

      .castle__door::before,
      .castle__door::after {
        content: "";
        position: absolute;
        top: 24px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #ffe1a2, #b57a32);
        box-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
      }

      .castle__door::before {
        left: 11px;
      }

      .castle__door::after {
        right: 11px;
      }

      .castle__torch {
        bottom: 52px;
        width: 9px;
        height: 22px;
        border-radius: 999px;
        background: linear-gradient(180deg, #ffd27a, #ff9332);
        box-shadow:
          0 0 18px rgba(255, 162, 60, 0.7),
          0 4px 8px rgba(0, 0, 0, 0.7);
        opacity: 0;
        transition: opacity 220ms var(--bezier-snap);
      }

      .castle__torch--left {
        left: calc(50% - 52px);
      }

      .castle__torch--right {
        left: calc(50% + 42px);
      }

      @keyframes torch-flicker {
        0% {
          transform: translateY(0);
          box-shadow: 0 0 16px rgba(255, 172, 70, 0.65);
        }
        50% {
          transform: translateY(-1px);
          box-shadow: 0 0 22px rgba(255, 192, 110, 0.85);
        }
        100% {
          transform: translateY(0);
          box-shadow: 0 0 16px rgba(255, 172, 70, 0.65);
        }
      }

      .castle__tower {
        bottom: 66px;
        width: 46px;
        height: 92px;
        border-radius: 16px;
        background: linear-gradient(180deg, #a2a7b5, #4c515e);
        border: 2px solid rgba(0, 0, 0, 0.6);
        box-shadow:
          inset 0 12px 20px rgba(255, 255, 255, 0.16),
          inset 0 -14px 20px rgba(0, 0, 0, 0.55);
        opacity: 0;
        transition: opacity 220ms var(--bezier-snap);
      }

      .castle__tower--left {
        left: 10%;
      }

      .castle__tower--right {
        right: 10%;
      }

      .castle__tower::before {
        content: "";
        position: absolute;
        top: -10px;
        left: 4px;
        right: 4px;
        height: 12px;
        background: repeating-linear-gradient(
          90deg,
          #3a3f4e 0 10px,
          #f5f7ff 10px 14px
        );
        border-radius: 8px;
      }

      .castle__weapon {
        left: 50%;
        bottom: 140px;
        width: 72px;
        height: 18px;
        transform: translateX(-50%);
        border-radius: 999px;
        background: linear-gradient(90deg, #343741, #686d7a);
        box-shadow: 0 10px 18px rgba(0, 0, 0, 0.65);
        opacity: 0;
        transition: opacity 220ms var(--bezier-snap);
      }

      .castle__weapon::before {
        content: "";
        position: absolute;
        left: 8px;
        right: 8px;
        top: 4px;
        height: 4px;
        border-radius: 999px;
        background: linear-gradient(90deg, #1b1d22, #444955);
      }

      .castle__flag {
        left: 64%;
        bottom: 154px;
        width: 4px;
        height: 48px;
        border-radius: 999px;
        background: linear-gradient(180deg, #f5f5f5, #b7bbc8);
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.6);
        opacity: 0;
        transition: opacity 220ms var(--bezier-snap);
      }

      .castle__flag::after {
        content: "";
        position: absolute;
        top: 6px;
        left: 4px;
        width: 24px;
        height: 14px;
        border-radius: 4px;
        background: linear-gradient(90deg, var(--gold-mid), #ff7d00);
        box-shadow: 0 10px 18px rgba(0, 0, 0, 0.45);
        transform-origin: left center;
        animation: flag-wave 1800ms ease-in-out infinite;
      }

      @keyframes flag-wave {
        0%,
        100% {
          transform: translateX(0) skewY(0deg);
        }
        50% {
          transform: translateX(2px) skewY(-5deg);
        }
      }

      .castle__shield {
        inset: -10px;
        border-radius: 26px;
        box-shadow: 0 0 0 rgba(var(--mana-blue), 0);
        opacity: 0;
        pointer-events: none;
      }

      .castle__particles {
        inset: -20px;
        pointer-events: none;
        opacity: 0;
      }

      .castle-upgraded .castle {
        transform: translateY(-2px) scale(1.02);
      }

      .castle.stage-1 .castle__base {
        width: 62%;
        height: 74px;
        bottom: 28px;
        background: linear-gradient(180deg, #b5874a, #6c3b18);
      }

      .castle.stage-1 .castle__roof {
        border-left-width: 60px;
        border-right-width: 60px;
        border-bottom-width: 38px;
        bottom: 96px;
      }

      .castle.stage-2 .castle__base {
        height: 90px;
      }

      .castle.stage-2 .castle__roof {
        border-left-width: 70px;
        border-right-width: 70px;
        border-bottom-width: 46px;
      }

      .castle.stage-2 .castle__flag {
        opacity: 1;
      }

      .castle.stage-3 .castle__base {
        background: linear-gradient(180deg, #a9afbd, #555a63);
      }

      .castle.stage-3 .castle__roof {
        border-bottom-color: #5d646f;
      }

      .castle.stage-3 .castle__base::before {
        content: "";
        position: absolute;
        top: -12px;
        left: 10px;
        right: 10px;
        height: 16px;
        border-radius: 12px;
        background: repeating-linear-gradient(
          90deg,
          #393c44 0 10px,

          } else if (typeof value === "object") {
            formattedData.fields[key] = { stringValue: JSON.stringify(value) };
          } else {
            formattedData.fields[key] = { stringValue: String(value) };
          }
        }

        // Required schema timestamp field (client ISO as timestampValue)
        // Note: True server-side timestamps are not available via this unauthenticated REST write.
        // We keep the schema field name as `timestamp`.

        try {
          const response = await fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(formattedData),
          });
          const result = await response.json();
          console.log("✅ Data saved via REST API:", result.name || result);
        } catch (error) {
          console.error("❌ REST API Save failed:", error);
        }
      };
    </script>

    <!-- New game controller -->
    <script>
      (function () {
        "use strict";

        function generateId(prefix) {
          if (window.crypto && window.crypto.randomUUID) {
            return prefix + "_" + window.crypto.randomUUID();

          return (

            "_" +
            Date.now().toString(36) +

            const existing = localStorage.getItem(key);
            if (existing) return existing;
            const id = generateId("user");
            localStorage.setItem(key, id);
            return id;
          } catch (e) {
            return generateId("user");

        })();

        const EXPERIMENT_CONDITION = (function () {
          const key = "match3Condition";
          const variants = ["A", "B"];
          try {
            const existing = localStorage.getItem(key);
            if (variants.includes(existing)) return existing;
            const variant = Math.random() < 0.5 ? "A" : "B";
            localStorage.setItem(key, variant);
            return variant;

            return "A";

        })();

        const energyEl = document.getElementById("energyValue");

        const castleEl = document.getElementById("castle");

        const upgradeBtn = document.getElementById("upgradeBtn");

        const statusLineEl = document.getElementById("statusLine");

        const scrollDialogEl = document.getElementById("scrollDialog");
        const scrollTitleEl = document.getElementById("scrollTitle");

        const scrollContinueBtn = document.getElementById("scrollContinueBtn");

        const tutorialOverlayEl = document.getElementById("tutorialOverlay");

        const tutorialTextEl = document.getElementById("tutorialText");
        const tutorialFingerEl = document.getElementById("tutorialFinger");
        const spotlightHoleEl = document.getElementById("spotlightHole");
        const skipTutorialBtn = document.getElementById("skipTutorialBtn");

        const logPreviewEl = document.getElementById("logPreview");

        const STORAGE_KEY_SAVE = "coinIslandState_v1";

        const MAX_ENERGY = 10;

        let tutorialStep = 0; // 1: open slot (compass), 2: spin, 3: upgrade

        const SYMBOLS = [

        }

                <path d="M108 124c10-16 22-24 36-22 10 2 16 10 14 20"

                <path d="M126 150c2-10 8-16 16-16 8 0 14 6 16 16"

          energy: svgDataUri(`

              <g filter="url(#glow)">
                <!-- faceted lightning shard -->
                <path d="M128 12l60 84-40 6 30 54-52 4 22 88-96-112 44-2-26-56 50-6z"
                      fill="url(#bg)" stroke="rgba(255,255,255,0.35)" stroke-width="6" stroke-linejoin="round"/>
                <path d="M110 66l42-6-24 44 32-6-40 70 14-56-32 4z" fill="rgba(255,255,255,0.28)"/>

          `),
          castle: svgDataUri(`
            <svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
              <defs>
                <linearGradient id="s" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0" stop-color="#cfd6e6"/>
                  <stop offset="0.55" stop-color="#6b7486"/>

                <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">

                <path d="M98 210v-70h60v70" fill="rgba(0,0,0,0.18)"/>
                <path d="M112 182c0-18 32-18 32 0v28h-32z" fill="#141721" opacity="0.85"/>
                <path d="M76 120h104" stroke="rgba(255,255,255,0.20)" stroke-width="6"/>

                  <path d="M86 150h84"/>

              </g>
            </svg>
          `),
          bomb: svgDataUri(`
            <svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
              <defs>
                <radialGradient id="b" cx="35%" cy="25%" r="70%">
                  <stop offset="0" stop-color="#4a4f5c"/>
                  <stop offset="0.5" stop-color="#1c1f2a"/>
                  <stop offset="1" stop-color="#07080c"/>
                </radialGradient>
                <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
                  <feDropShadow dx="0" dy="18" stdDeviation="10" flood-color="#000" flood-opacity="0.65"/>
                </filter>
                <radialGradient id="fire" cx="40%" cy="30%" r="70%">
                  <stop offset="0" stop-color="#fff2b0"/>
                  <stop offset="0.4" stop-color="#ffb347"/>
                  <stop offset="1" stop-color="#ff3d7f"/>
                </radialGradient>
              </defs>
              <g filter="url(#ds)">
                <circle cx="120" cy="144" r="84" fill="url(#b)" stroke="rgba(255,255,255,0.10)" stroke-width="6"/>
                <path d="M154 64c10-16 24-22 40-16" fill="none" stroke="#c7b7ff" stroke-width="8" stroke-linecap="round"/>
                <path d="M196 46c-6 12-6 24 0 36" fill="none" stroke="#8a8fa0" stroke-width="6" stroke-linecap="round"/>
                <circle cx="200" cy="44" r="14" fill="url(#fire)"/>

        };

        function setReelIcon(el, iconKey) {
          if (!el) return;
          const src = ICONS[iconKey] || ICONS.coin_lion;
          const extraClass = iconKey === "energy" ? "energy" : "";
          el.innerHTML = `<img class="reel-icon ${extraClass}" alt="${iconKey}" src="${src}" />`;
        }

        // Set initial reel visuals
        setReelIcon(reelEls[0], "coin_lion");
        setReelIcon(reelEls[1], "energy");
        setReelIcon(reelEls[2], "castle");

        function setStatus(message, isError) {
          if (!statusLineEl) return;
          statusLineEl.classList.toggle("error", !!isError);
          const span = statusLineEl.querySelector("span");
          if (span) span.textContent = message;
        }

        window.__appendVisualLog = function (eventObj) {
          if (!logPreviewEl) return;
          const now = new Date().toISOString();
          const entry = { at: now, event: eventObj };
          if (!window.__visualLogBuffer) window.__visualLogBuffer = [];
          window.__visualLogBuffer.push(entry);
          window.__visualLogBuffer = window.__visualLogBuffer.slice(-10);
          logPreviewEl.classList.remove("log-preview-empty");
          logPreviewEl.textContent = JSON.stringify(
            window.__visualLogBuffer.map((x) => x.event),
            null,
            2
          );
        };

        // Expose research context for the unified logger
        window.__researchContext = {
          userId: USER_ID,
          sessionId: SESSION_ID,
          condition: EXPERIMENT_CONDITION,
        };

        function logEvent(eventType, params) {
          if (typeof window.saveToFirestore === "function") {
            window.saveToFirestore(eventType, params || {});
          }
        }

        function upgradeCostForStage(s) {
          if (s >= MAX_STAGE) return 0;
          return STAGE_COST[s] || 100;
        }

        function updateCastleStage() {
          if (!castleEl) return;
          for (let i = 1; i <= MAX_STAGE; i++) {
            castleEl.classList.remove("stage-" + i);
          }
          castleEl.classList.add("stage-" + stage);
        }

        function persistState() {
          try {
            localStorage.setItem(
              STORAGE_KEY_SAVE,
              JSON.stringify({ energy, coins, stage, spinIndex })
            );
          } catch (e) {}
        }

        function loadState() {
          try {
            const raw = localStorage.getItem(STORAGE_KEY_SAVE);
            if (!raw) return;
            const s = JSON.parse(raw);
            if (!s || typeof s !== "object") return;
            if (typeof s.energy === "number") energy = s.energy;
            if (typeof s.coins === "number") coins = s.coins;
            if (typeof s.stage === "number") stage = s.stage;
            if (typeof s.spinIndex === "number") spinIndex = s.spinIndex;
          } catch (e) {}
        }

        function updateUI() {
          if (energyEl) energyEl.textContent = String(energy);
          if (coinsEl) coinsEl.textContent = String(coins);
          if (stageEl) stageEl.textContent = String(stage);

          if (energyFillEl) {
            energyFillEl.style.width = Math.round((energy / MAX_ENERGY) * 100) + "%";
          }

          const cost = upgradeCostForStage(stage);
          if (coinsFillEl) {
            const denom = Math.max(1, cost);
            const pct = Math.max(0, Math.min(100, Math.round((coins / denom) * 100)));
            coinsFillEl.style.width = pct + "%";
          }

          if (upgradeCostEl) upgradeCostEl.textContent = String(cost);

          if (spinBtn) spinBtn.disabled = energy <= 0;
          if (openSlotBtn) openSlotBtn.disabled = energy <= 0;
          if (upgradeBtn) upgradeBtn.disabled = stage >= MAX_STAGE || coins < cost;

          updateCastleStage();
        }

        function weightedPickSymbol() {
          const total = SYMBOLS.reduce((sum, s) => sum + s.weight, 0);
          let roll = Math.random() * total;
          for (const s of SYMBOLS) {
            roll -= s.weight;
            if (roll <= 0) {
              if (s.variants && s.variants.length) {
                const v = s.variants[Math.floor(Math.random() * s.variants.length)];
                return { ...s, icon: v };
              }
              return s;
            }
          }
          return SYMBOLS[0];
        }

        function computePayout(symbols) {
          const names = symbols.map((s) => s.name);
          const counts = names.reduce((m, n) => {
            m[n] = (m[n] || 0) + 1;
            return m;
          }, {});
          const entries = Object.entries(counts).sort((x, y) => y[1] - x[1]);
          const [topName, topCount] = entries[0];
          if (topCount === 3) {
            const sym = SYMBOLS.find((s) => s.name === topName) || symbols[0];
            return Math.max(0, sym.base * 6);
          }
          if (topCount === 2) {
            const sym = SYMBOLS.find((s) => s.name === topName) || symbols[0];
            return Math.max(0, sym.base * 2);
          }
          return names.includes("Bomb") ? 0 : 5;
        }

        function animateReelsFast() {
          if (reelsWrap) reelsWrap.classList.add("is-spinning");
          reelEls.forEach((el) => {
            if (!el) return;
            el.classList.remove("spinning");
            void el.offsetWidth;
            el.classList.add("spinning");
            setTimeout(() => el.classList.remove("spinning"), 520);
          });
          if (reelsWrap) {
            setTimeout(() => reelsWrap.classList.remove("is-spinning"), 560);
          }
        }

        function spawnFlyingCoins(count) {
          const sourceEl = reelsWrap || spinBtn;
          if (!sourceEl || !coinsEl) return;
          const from = sourceEl.getBoundingClientRect();
          const to = coinsEl.getBoundingClientRect();

          const startX = from.left + from.width / 2;
          const startY = from.top + from.height / 2;
          const endX = to.left + to.width / 2;
          const endY = to.top + to.height / 2;

          for (let i = 0; i < count; i++) {
            const p = document.createElement("div");
            p.className = "coin-particle";
            document.body.appendChild(p);

            p.style.left = Math.round(startX) + "px";
            p.style.top = Math.round(startY) + "px";

            const midX = startX + (endX - startX) * 0.5 + (Math.random() * 120 - 60);
            const midY = Math.min(startY, endY) - (80 + Math.random() * 120);
            const dur = 720 + Math.random() * 260;

            p.animate(
              [
                { transform: "translate(-50%, -50%) scale(1)", opacity: 1 },
                {
                  transform: `translate(${midX - startX}px, ${
                    midY - startY
                  }px) translate(-50%, -50%) scale(1.1)`,
                  opacity: 1,
                },
                {
                  transform: `translate(${endX - startX}px, ${
                    endY - startY
                  }px) translate(-50%, -50%) scale(0.6)`,
                  opacity: 0,
                },
              ],
              {
                duration: dur,
                easing: "cubic-bezier(0.2, 0.9, 0.2, 1)",
                fill: "forwards",
              }
            ).onfinish = () => p.remove();
          }
        }

        function tutorialSeen() {
          try {
            return localStorage.getItem(STORAGE_KEY_TUTORIAL) === "1";
          } catch (e) {
            return false;
          }
        }

        function setTutorialSeen() {
          try {
            localStorage.setItem(STORAGE_KEY_TUTORIAL, "1");
          } catch (e) {}
        }

        function clearTutorialHighlight() {
          [openSlotBtn, spinBtn, upgradeBtn, closeSlotBtn].forEach((el) => {
            if (el) el.classList.remove("tutorial-target");
          });
        }

        function positionSpotlightOn(targetEl) {
          if (!spotlightHoleEl || !tutorialTooltipEl || !targetEl) return;
          const rect = targetEl.getBoundingClientRect();
          const pad = 10;
          const x = Math.max(0, rect.left - pad);
          const y = Math.max(0, rect.top - pad);
          const w = Math.min(window.innerWidth, rect.width + pad * 2);
          const h = Math.min(window.innerHeight, rect.height + pad * 2);

          spotlightHoleEl.setAttribute("x", String(Math.round(x)));
          spotlightHoleEl.setAttribute("y", String(Math.round(y)));
          spotlightHoleEl.setAttribute("width", String(Math.round(w)));
          spotlightHoleEl.setAttribute("height", String(Math.round(h)));
          spotlightHoleEl.setAttribute("rx", "18");
          spotlightHoleEl.setAttribute("ry", "18");

          // Make the hole truly clickable by blocking around it with 4 regions.
          const shield = document.querySelector(".spotlight-shield");
          if (shield) {
            const topB = shield.querySelector('[data-blocker="top"]');
            const leftB = shield.querySelector('[data-blocker="left"]');
            const rightB = shield.querySelector('[data-blocker="right"]');
            const bottomB = shield.querySelector('[data-blocker="bottom"]');

            const vw = window.innerWidth;
            const vh = window.innerHeight;

            if (topB) {
              topB.style.left = "0px";
              topB.style.top = "0px";
              topB.style.width = vw + "px";
              topB.style.height = Math.max(0, y) + "px";
            }

            if (bottomB) {
              bottomB.style.left = "0px";
              bottomB.style.top = Math.min(vh, y + h) + "px";
              bottomB.style.width = vw + "px";
              bottomB.style.height = Math.max(0, vh - (y + h)) + "px";
            }

            if (leftB) {
              leftB.style.left = "0px";
              leftB.style.top = Math.max(0, y) + "px";
              leftB.style.width = Math.max(0, x) + "px";
              leftB.style.height = Math.max(0, h) + "px";
            }

            if (rightB) {
              rightB.style.left = Math.min(vw, x + w) + "px";
              rightB.style.top = Math.max(0, y) + "px";
              rightB.style.width = Math.max(0, vw - (x + w)) + "px";
              rightB.style.height = Math.max(0, h) + "px";
            }
          }

          if (tutorialFingerEl) {
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            tutorialFingerEl.style.left = Math.round(cx) + "px";
            tutorialFingerEl.style.top = Math.round(cy + 10) + "px";
          }

          const tooltipTop = rect.top > 180 ? rect.top - 12 : rect.bottom + 12;
          const tooltipLeft = Math.max(
            14,
            Math.min(rect.left, window.innerWidth - 14 - 320)
          );
          tutorialTooltipEl.style.top = tooltipTop + "px";
          tutorialTooltipEl.style.left = tooltipLeft + "px";
        }

        function logTutorialStep(stepNumber, phase) {
          const spentMs =
            tutorialStepShownAtMs === null
              ? 0
              : Math.round(Math.max(0, performance.now() - tutorialStepShownAtMs));
          logEvent("tutorial_step", { stepNumber, phase, timeSpentOnStep: spentMs });
        }

        function showScrollForStep(stepNumber) {
          if (!scrollDialogEl) return;
          let title = "Tutorial";
          let body = "";
          if (stepNumber === 1) {
            title = "Step 1 – Ancient Tablet";
            body =
              "First, tap the golden compass to open the slot machine.";
          } else if (stepNumber === 2) {
            title = "Step 2 – Rigged Spin";
            body =
              "Now tap Spin on the tablet. This first spin is rigged to win enough coins.";
          } else if (stepNumber === 3) {
            title = "Step 3 – Upgrade";
            body =
              "Finally, use your coins to upgrade the castle on the island.";
          }
          scrollTitleEl.textContent = title;
          scrollBodyEl.textContent = body;
          scrollDialogEl.classList.add("scroll-visible");
          if (tutorialOverlayEl) tutorialOverlayEl.classList.add("hidden");
        }

        function hideScroll() {
          if (!scrollDialogEl) return;
          scrollDialogEl.classList.remove("scroll-visible");
        }

        function enterTutorialStep(stepNumber) {
          tutorialStep = stepNumber;
          tutorialStepShownAtMs = performance.now();
          clearTutorialHighlight();
          showScrollForStep(stepNumber);
          logTutorialStep(stepNumber, "start");
        }

        function completeTutorialStep(stepNumber) {
          if (tutorialStep !== stepNumber) return;
          logTutorialStep(stepNumber, "end");
        }

        function endTutorial() {
          tutorialStep = 0;
          tutorialStepShownAtMs = null;
          clearTutorialHighlight();
          if (tutorialOverlayEl) tutorialOverlayEl.classList.add("hidden");
          hideScroll();
          setTutorialSeen();
        }

        function openSlotModal() {
          if (!slotModalEl) return;
          slotModalEl.classList.remove("hidden");
          logEvent("ui_navigation", { action: "open_slot" });
        }

        function closeSlotModal() {
          if (!slotModalEl) return;
          slotModalEl.classList.add("hidden");
          logEvent("ui_navigation", { action: "close_slot" });
        }

        async function runSpin(triggeredByTutorial) {
          if (energy <= 0) {
            setStatus("Out of energy. Refill to spin.", true);
            return;
          }

          const nowMs = performance.now();
          const reactionTimeMs =
            lastSpinAtMs === null ? 0 : Math.round(nowMs - lastSpinAtMs);
          lastSpinAtMs = nowMs;

          const energyBefore = energy;
          energy -= 1;
          spinIndex += 1;

          animateReelsFast();
          // Wait slightly longer than reel animation (520ms)
          await new Promise((r) => setTimeout(r, 560));

          let tutorialRigged = false;
          let result = [weightedPickSymbol(), weightedPickSymbol(), weightedPickSymbol()];

          if (triggeredByTutorial && !tutorialRiggedSpinUsed) {
            tutorialRiggedSpinUsed = true;
            tutorialRigged = true;
            const coinSym = SYMBOLS.find((s) => s.name === "Coin") || SYMBOLS[0];
            result = [coinSym, coinSym, coinSym];
          }

          reelEls.forEach((el, i) => {
            setReelIcon(el, result[i].icon);
          });

          let coinsWon = computePayout(result);
          if (triggeredByTutorial && tutorialRigged) {
            const cost = upgradeCostForStage(stage);
            const needed = Math.max(0, cost - coins);
            coinsWon = Math.max(coinsWon, needed);
          }

          coins += coinsWon;
          setStatus(coinsWon > 0 ? `+${coinsWon} coins!` : "No payout.", coinsWon <= 0);

          logEvent("spin_result", {
            spinIndex,
            energyBefore,
            resultReels: result.map((s) => s.name),
            // Keep field name for compatibility; now logs icon ids (strings)
            resultReelsEmoji: result.map((s) => s.icon),
            coinsWon,
            reactionTimeMs,
            tutorialRigged,
          });

          if (coinsWon > 0) {
            spawnFlyingCoins(15);
          }

          persistState();
          updateUI();
        }

        function handleUpgrade() {
          const cost = upgradeCostForStage(stage);
          if (stage >= MAX_STAGE) return;

          if (coins < cost && tutorialStep === 3) {
            const missing = cost - coins;
            if (missing > 0) coins += missing;
          }

          if (coins < cost) {
            setStatus("Not enough coins to upgrade.", true);
            return;
          }

          const before = stage;
          coins -= cost;
          stage = Math.min(MAX_STAGE, stage + 1);

          const wrap = castleEl ? castleEl.closest(".castle-wrap") : null;
          if (wrap) {
            wrap.classList.remove("castle-upgraded");
            void wrap.offsetWidth;
            wrap.classList.add("castle-upgraded");
            setTimeout(() => wrap.classList.remove("castle-upgraded"), 520);
          }

          logEvent("village_upgrade", {
            stageBefore: before,
            stageAfter: stage,
            cost,
            coinsRemaining: coins,
          });

          persistState();
          updateUI();

          if (tutorialStep === 3) {
            completeTutorialStep(3);
            endTutorial();
          }
        }

        function handleRefill() {
          const before = energy;
          energy = MAX_ENERGY;
          logEvent("energy_refill", { energyBefore: before, energyAfter: energy });
          persistState();
          updateUI();
        }

        openSlotBtn.addEventListener("click", function () {
          openSlotModal();
          if (tutorialStep === 1) {
            completeTutorialStep(1);
            hideScroll();
            if (tutorialOverlayEl) tutorialOverlayEl.classList.remove("hidden");
            clearTutorialHighlight();
            tutorialStep = 2;
            tutorialStepShownAtMs = performance.now();
            tutorialTextEl.textContent =
              "Tap Spin to perform the first rigged spin.";
            spinBtn.classList.add("tutorial-target");
            positionSpotlightOn(spinBtn);
            logTutorialStep(2, "start");
          }
        });

        closeSlotBtn.addEventListener("click", function () {
          closeSlotModal();
        });

        spinBtn.addEventListener("click", async function () {
          if (tutorialStep === 2) {
            await runSpin(true);
            completeTutorialStep(2);
            hideScroll();
            tutorialStep = 3;
            tutorialStepShownAtMs = performance.now();
            if (tutorialOverlayEl) tutorialOverlayEl.classList.remove("hidden");
            tutorialTextEl.textContent =
              "Now tap Upgrade to improve your castle.";
            clearTutorialHighlight();
            upgradeBtn.classList.add("tutorial-target");
            positionSpotlightOn(upgradeBtn);
            logTutorialStep(3, "start");
            return;
          }
          await runSpin(false);
        });

        upgradeBtn.addEventListener("click", function () {
          handleUpgrade();
        });

        refillBtn.addEventListener("click", function () {
          handleRefill();
        });

        if (scrollContinueBtn) {
          scrollContinueBtn.addEventListener("click", function () {
            hideScroll();
            if (tutorialOverlayEl) tutorialOverlayEl.classList.remove("hidden");

            if (tutorialStep === 1) {
              clearTutorialHighlight();
              openSlotBtn.classList.add("tutorial-target");
              tutorialTextEl.textContent = "Tap the compass to open the slot machine.";
              positionSpotlightOn(openSlotBtn);
            } else if (tutorialStep === 2) {
              clearTutorialHighlight();
              spinBtn.classList.add("tutorial-target");
              tutorialTextEl.textContent = "Tap Spin to perform the rigged spin.";
              positionSpotlightOn(spinBtn);
            } else if (tutorialStep === 3) {
              clearTutorialHighlight();
              upgradeBtn.classList.add("tutorial-target");
              tutorialTextEl.textContent = "Tap Upgrade to level up your castle.";
              positionSpotlightOn(upgradeBtn);
            }
          });
        }

        if (skipTutorialBtn) {
          skipTutorialBtn.addEventListener("click", function () {
            if (tutorialStep) logTutorialStep(tutorialStep, "skip");
            endTutorial();
            updateUI();
          });
        }

        window.addEventListener("resize", function () {
          if (tutorialStep === 1) positionSpotlightOn(openSlotBtn);
          if (tutorialStep === 2) positionSpotlightOn(spinBtn);
          if (tutorialStep === 3) positionSpotlightOn(upgradeBtn);
        });

        loadState();
        updateUI();
        logEvent("game_start", { initialEnergy: energy, initialCoins: coins });

        if (!tutorialSeen()) {
          enterTutorialStep(1);
        } else {
          endTutorial();
        }
      })();
    </script>
  </body>
</html>
