<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Coin‑Style Slot Research Prototype</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        --tile-size: 64px;
        --board-size: 8;
        --gap: 6px;
        --bg: radial-gradient(circle at top, #3a1160 0%, #15062a 45%, #05010c 100%);
        --accent: #ffd166;
        --accent-soft: rgba(255, 209, 102, 0.16);
        --panel-bg: rgba(12, 6, 28, 0.92);
        --panel-border: rgba(255, 255, 255, 0.08);
        --text-main: #fdfdfd;
        --text-subtle: #c7b7ff;
        --danger: #ff3d7f;
        --success: #67f5c1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background-image: var(--bg);
        color: var(--text-main);
      }

      .hidden {
        display: none !important;
      }

      /* Mobile-first shell */
      .phone {
        width: min(420px, 100vw);
        min-height: 100vh;
        padding: 16px 14px 86px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      @media (min-width: 680px) {
        .phone {
          min-height: 820px;
          border-radius: 26px;
          border: 1px solid rgba(255, 255, 255, 0.14);
          background: radial-gradient(circle at top left, rgba(255, 209, 102, 0.06), rgba(255, 255, 255, 0.0) 55%),
            radial-gradient(circle at top, rgba(181, 23, 255, 0.10), rgba(0, 0, 0, 0) 55%);
          box-shadow: 0 30px 90px rgba(0, 0, 0, 0.75);
        }
      }

      .hud {
        background: rgba(12, 6, 28, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        padding: 12px 12px 10px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(10px);
      }

      .hud-top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 10px;
        margin-bottom: 10px;
      }

      .hud-title {
        font-weight: 800;
        letter-spacing: 0.04em;
        font-size: 0.95rem;
        text-transform: uppercase;
        color: var(--text-subtle);
      }

      .hud-level {
        font-weight: 700;
        color: var(--accent);
      }

      .hud-bars {
        display: grid;
        gap: 10px;
      }

      .hud-bar {
        display: grid;
        grid-template-columns: 54px 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .hud-bar-label {
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-subtle);
      }

      .hud-bar-track {
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.10);
        border: 1px solid rgba(255, 255, 255, 0.12);
        overflow: hidden;
      }

      .hud-bar-fill {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        transition: width 220ms ease-out;
      }

      .hud-bar-fill.energy {
        background: linear-gradient(90deg, #67f5c1, #3bf0ff);
      }

      .hud-bar-fill.coins {
        background: linear-gradient(90deg, #ffd166, #b517ff);
      }

      .hud-bar-value {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        color: var(--text-main);
      }

      .village-screen {
        flex: 1;
        display: flex;
        align-items: stretch;
      }

      .village-scene {
        width: 100%;
        background: rgba(12, 6, 28, 0.70);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 22px;
        padding: 14px;
        box-shadow: 0 18px 55px rgba(0, 0, 0, 0.6);
        position: relative;
        overflow: hidden;
      }

      .castle-wrap {
        position: relative;
        height: 280px;
        border-radius: 20px;
        background:
          radial-gradient(circle at 30% 20%, rgba(255, 209, 102, 0.22), transparent 55%),
          radial-gradient(circle at 70% 0%, rgba(181, 23, 255, 0.25), transparent 55%),
          linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.15));
        border: 1px solid rgba(255, 255, 255, 0.10);
        display: grid;
        place-items: center;
        margin-bottom: 14px;
      }

      .castle {
        font-size: 4rem;
        line-height: 1;
        display: grid;
        place-items: center;
        filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.55));
        transition: transform 240ms ease-out, filter 240ms ease-out;
      }

      .castle.stage-1::before { content: "⛺"; }
      .castle.stage-2::before { content: "🏚️"; }
      .castle.stage-3::before { content: "🏠"; }
      .castle.stage-4::before { content: "🏡"; }
      .castle.stage-5::before { content: "🏰"; }
      .castle.stage-6::before { content: "🏰✨"; }
      .castle.stage-7::before { content: "🏰🏳️"; }
      .castle.stage-8::before { content: "🏰👑"; }
      .castle.stage-9::before { content: "🏰🌟👑"; }
      .castle.stage-10::before { content: "🏰🏳️‍🌈👑✨"; }

      .castle-glow {
        position: absolute;
        inset: -40px;
        background: radial-gradient(circle at center, rgba(255, 209, 102, 0.25), transparent 55%);
        opacity: 0;
        transition: opacity 220ms ease-out;
        pointer-events: none;
      }

      .castle-upgraded .castle {
        transform: translateY(-2px) scale(1.02);
        filter: drop-shadow(0 22px 28px rgba(0, 0, 0, 0.65));
      }

      .castle-upgraded .castle-glow {
        opacity: 1;
      }

      .village-actions {
        display: grid;
        gap: 10px;
      }

      .cta-spin {
        position: fixed;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        width: min(420px, calc(100vw - 28px));
        padding: 14px 18px;
        border-radius: 18px;
        font-size: 1.05rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: linear-gradient(135deg, #ffd166, #b517ff);
        color: #1b1400;
        border: none;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.7);
      }

      /* Modal (slide-up sheet) */
      .modal {
        position: fixed;
        inset: 0;
        display: grid;
        align-items: end;
        z-index: 60;
      }

      .modal.hidden {
        display: none;
      }

      .modal-sheet {
        border-radius: 22px 22px 0 0;
        background: rgba(12, 6, 28, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 -24px 70px rgba(0, 0, 0, 0.75);
        padding: 14px 14px 18px;
        animation: sheet-up 220ms ease-out;
      }

      @keyframes sheet-up {
        from { transform: translateY(16px); opacity: 0.6; }
        to { transform: translateY(0); opacity: 1; }
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .modal-title {
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .reels-modal {
        margin-bottom: 12px;
      }

      .visual-log {
        position: relative;
        margin-top: 0;
      }

      /* Spotlight tutorial */
      .spotlight {
        position: fixed;
        inset: 0;
        z-index: 80;
      }

      .spotlight.hidden {
        display: none;
      }

      .spotlight-dim {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.62);
        /* hole rectangle controlled by CSS vars */
        clip-path: polygon(
          0% 0%,
          0% 100%,
          100% 100%,
          100% 0%,
          0% 0%,
          0% 0%,
          calc(var(--hole-x, 0px)) calc(var(--hole-y, 0px)),
          calc(var(--hole-x, 0px)) calc(var(--hole-y, 0px) + var(--hole-h, 0px)),
          calc(var(--hole-x, 0px) + var(--hole-w, 0px)) calc(var(--hole-y, 0px) + var(--hole-h, 0px)),
          calc(var(--hole-x, 0px) + var(--hole-w, 0px)) calc(var(--hole-y, 0px)),
          calc(var(--hole-x, 0px)) calc(var(--hole-y, 0px))
        );
      }

      .spotlight-tooltip {
        position: absolute;
        max-width: min(320px, calc(100vw - 28px));
        background: rgba(12, 6, 28, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 16px;
        padding: 12px 12px 10px;
        box-shadow: 0 18px 55px rgba(0, 0, 0, 0.7);
      }

      .spotlight-text {
        font-size: 0.92rem;
        color: var(--text-main);
        line-height: 1.45;
        margin-bottom: 10px;
      }

      .spotlight-actions {
        display: flex;
        justify-content: flex-end;
      }

      .left {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .title {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        margin-bottom: 4px;
      }

      .title-main {
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: 0.03em;
      }

      .title-sub {
        font-size: 0.9rem;
        color: var(--text-subtle);
      }

      .board-wrapper {
        position: relative;
        padding: 12px;
        border-radius: 18px;
        background: radial-gradient(circle at top, #161f3f 0, #050814 70%);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.04),
          0 18px 45px rgba(0, 0, 0, 0.7);
      }

      .board {
        display: grid;
        grid-template-columns: repeat(var(--board-size), var(--tile-size));
        grid-template-rows: repeat(var(--board-size), var(--tile-size));
        gap: var(--gap);
        position: relative;
      }

      .tile {
        width: var(--tile-size);
        height: var(--tile-size);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
        cursor: pointer;
        position: relative;
        transition:
          transform 120ms ease-out,
          box-shadow 120ms ease-out,
          filter 120ms ease-out,
          border-radius 120ms ease-out,
          outline 80ms ease-out;
        box-shadow:
          0 6px 10px rgba(0, 0, 0, 0.5),
          inset 0 0 0 1px rgba(255, 255, 255, 0.25);
      }

      .tile::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: radial-gradient(circle at 20% 0, rgba(255, 255, 255, 0.35), transparent);
        mix-blend-mode: screen;
        opacity: 0.9;
        pointer-events: none;
      }

      .tile:hover {
        transform: translateY(-3px);
        box-shadow:
          0 10px 18px rgba(0, 0, 0, 0.7),
          inset 0 0 0 1px rgba(255, 255, 255, 0.35);
        filter: brightness(1.03);
      }

      .tile.selected {
        outline: 3px solid var(--accent);
        outline-offset: 0;
        box-shadow:
          0 0 0 2px rgba(0, 0, 0, 0.9),
          0 0 16px rgba(255, 204, 0, 0.8);
        transform: translateY(-1px) scale(1.03);
      }

      .tile.clearing {
        animation: pop-out 260ms ease-in forwards;
      }

      .tile-idle {
        animation: idle-bounce 2200ms infinite ease-in-out;
      }

      @keyframes pop-out {
        0% {
          transform: scale(1) translateY(-1px);
          opacity: 1;
        }
        100% {
          transform: scale(0.25) translateY(-6px);
          opacity: 0;
        }
      }

      @keyframes idle-bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-3px);
        }
      }

      /* Tile color themes */
      .tile-type-0 {
        background: linear-gradient(135deg, #ff6b6b, #ff3366);
      }
      .tile-type-1 {
        background: linear-gradient(135deg, #4dd0e1, #2979ff);
      }
      .tile-type-2 {
        background: linear-gradient(135deg, #ffd54f, #ffb300);
      }
      .tile-type-3 {
        background: linear-gradient(135deg, #b39ddb, #7e57c2);
      }
      .tile-type-4 {
        background: linear-gradient(135deg, #81c784, #00c853);
      }
      .tile-type-5 {
        background: linear-gradient(135deg, #ff8a65, #ff7043);
      }

      .top-bar {
        grid-column: 1 / -1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        padding: 10px 18px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(32, 42, 83, 0.96),
          rgba(10, 16, 40, 0.96)
        );
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow:
          0 10px 28px rgba(0, 0, 0, 0.65),
          0 0 0 1px rgba(255, 255, 255, 0.04);
      }

      .top-bar-section {
        display: flex;
        align-items: baseline;
        gap: 6px;
      }

      .top-bar-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--text-subtle);
      }

      .top-bar-value {
        font-size: 1rem;
        font-weight: 600;
        color: var(--accent);
      }

      .start-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          circle at top,
          rgba(18, 26, 60, 0.98),
          rgba(2, 4, 10, 0.98)
        );
        z-index: 20;
      }

      /* Tutorial overlay should not block target buttons */
      .start-screen.pass-through {
        pointer-events: none;
      }

      .start-screen.pass-through .start-card {
        pointer-events: none;
      }

      .tutorial-skip {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 30;
        pointer-events: auto;
        font-size: 0.72rem;
        padding: 7px 10px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.05));
        color: var(--text-main);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45);
      }

      .tutorial-skip:hover {
        filter: brightness(1.08);
      }

      .tutorial-target {
        position: relative;
        z-index: 25;
        pointer-events: auto;
        animation: tutorial-pulse 1000ms infinite ease-in-out;
      }

      @keyframes tutorial-pulse {
        0% {
          transform: translateY(0);
          box-shadow:
            0 6px 15px rgba(0, 0, 0, 0.65),
            0 0 0 0 rgba(255, 209, 102, 0.0),
            0 0 0 1px rgba(0, 0, 0, 0.6);
        }
        50% {
          transform: translateY(-1px);
          box-shadow:
            0 10px 26px rgba(0, 0, 0, 0.8),
            0 0 0 6px rgba(255, 209, 102, 0.16),
            0 0 22px rgba(181, 23, 255, 0.35),
            0 0 0 1px rgba(0, 0, 0, 0.7);
        }
        100% {
          transform: translateY(0);
          box-shadow:
            0 6px 15px rgba(0, 0, 0, 0.65),
            0 0 0 0 rgba(255, 209, 102, 0.0),
            0 0 0 1px rgba(0, 0, 0, 0.6);
        }
      }

      .start-card {
        max-width: 440px;
        width: 90%;
        background: rgba(6, 10, 30, 0.98);
        border-radius: 20px;
        padding: 24px 24px 20px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow:
          0 26px 80px rgba(0, 0, 0, 0.85),
          0 0 0 1px rgba(255, 255, 255, 0.06);
      }

      .start-title {
        font-size: 1.9rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
      }

      .start-subtitle {
        font-size: 0.95rem;
        color: var(--text-subtle);
        line-height: 1.6;
        margin-bottom: 20px;
      }

      .start-button {
        width: 100%;
        justify-content: center;
      }

      .right {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .panel {
        background: var(--panel-bg);
        border-radius: 16px;
        padding: 16px 18px;
        border: 1px solid var(--panel-border);
        box-shadow:
          0 12px 35px rgba(0, 0, 0, 0.6),
          inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px 14px;
        align-items: center;
      }

      .stat-label {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.13em;
        color: var(--text-subtle);
      }

      .stat-value {
        font-size: 1.1rem;
        font-weight: 600;
      }

      .stat-highlight {
        color: var(--accent);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      button {
        border-radius: 999px;
        border: none;
        padding: 9px 16px;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: linear-gradient(135deg, var(--accent), #ff9f1c);
        color: #1b1400;
        box-shadow:
          0 6px 15px rgba(0, 0, 0, 0.65),
          0 0 0 1px rgba(0, 0, 0, 0.6);
        transition:
          transform 110ms ease-out,
          box-shadow 110ms ease-out,
          filter 110ms ease-out;
        white-space: nowrap;
      }

      button.secondary {
        background: linear-gradient(135deg, #394b7c, #18213e);
        color: #f7f8ff;
      }

      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        box-shadow: none;
        transform: none;
      }

      button:not(:disabled):hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
        box-shadow:
          0 10px 26px rgba(0, 0, 0, 0.8),
          0 0 0 1px rgba(0, 0, 0, 0.7);
      }

      button:not(:disabled):active {
        transform: translateY(1px) scale(0.99);
        box-shadow:
          0 3px 10px rgba(0, 0, 0, 0.7),
          0 0 0 1px rgba(0, 0, 0, 0.85);
      }

      .hint {
        font-size: 0.78rem;
        color: var(--text-subtle);
        margin-top: 10px;
        line-height: 1.45;
      }

      .hint code {
        font-family: "JetBrains Mono", Consolas, monospace;
        font-size: 0.78rem;
        background: rgba(10, 10, 20, 0.8);
        padding: 1px 5px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
      }

      .chip {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: radial-gradient(circle at top, rgba(255, 255, 255, 0.05), transparent);
        color: var(--text-subtle);
      }

      .chip.accent {
        border-color: rgba(255, 204, 0, 0.6);
        color: var(--accent);
        background: radial-gradient(circle at top, rgba(255, 204, 0, 0.2), transparent);
      }

      .log-preview {
        margin-top: 10px;
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(6, 10, 30, 0.96);
        border: 1px dashed rgba(255, 255, 255, 0.08);
        max-height: 140px;
        overflow: auto;
        font-family: "JetBrains Mono", Consolas, monospace;
        font-size: 0.75rem;
        line-height: 1.45;
        color: #d0ddff;
      }

      .log-preview-empty {
        color: var(--text-subtle);
        font-style: italic;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 0.72rem;
        padding: 4px 7px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        border: 1px solid rgba(255, 204, 0, 0.45);
      }

      .badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.2);
      }

      .status-line {
        margin-top: 8px;
        font-size: 0.82rem;
        color: var(--text-subtle);
      }

      .status-line span {
        color: var(--success);
      }

      .status-line.error span {
        color: var(--danger);
      }

      /* Slot + Village UI */
      .slot-wrapper {
        padding: 18px;
      }

      .slot-machine {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }

      .reels {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .reel {
        height: 92px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        font-size: 2.8rem;
        background: radial-gradient(circle at top, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.04));
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow:
          inset 0 0 0 1px rgba(0, 0, 0, 0.55),
          0 14px 35px rgba(0, 0, 0, 0.6);
      }

      .reel.spinning {
        animation: reel-spin 650ms ease-in-out;
      }

      @keyframes reel-spin {
        0% {
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
        25% {
          transform: translateY(-6px) scale(1.02);
          filter: blur(0.5px);
        }
        60% {
          transform: translateY(10px) scale(0.98);
          filter: blur(0.8px);
        }
        100% {
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }

      .village {
        margin-top: 12px;

      // Make saveToFirestore available globally using Firestore REST API
      window.saveToFirestore = async function (data) {
        if (typeof window.__appendVisualLog === "function") {
          try {
            window.__appendVisualLog(data);
          } catch (e) {
            // ignore visual log errors
          }
        }
        const url = `https://firestore.googleapis.com/v1/projects/ppltx-project-dev/databases/mt-game/documents/game_results?key=${firebaseConfig.apiKey}`;

        // Format data for Firestore REST API with proper Firestore types
        const formattedData = {
          fields: {},
        };

        for (const key in data) {
          if (!Object.prototype.hasOwnProperty.call(data, key)) continue;
          const value = data[key];

          if (value === null || value === undefined) {
            continue;
          } else if (typeof value === "number") {
            formattedData.fields[key] = Number.isInteger(value)
              ? { integerValue: value }
              : { doubleValue: value };
          } else if (typeof value === "boolean") {
            formattedData.fields[key] = { booleanValue: value };
          } else if (value instanceof Date) {
            formattedData.fields[key] = { timestampValue: value.toISOString() };
          } else if (typeof value === "object") {
            formattedData.fields[key] = { stringValue: JSON.stringify(value) };
          } else {
            // Default to string for all other primitive / JSON-serializable values
            formattedData.fields[key] = { stringValue: String(value) };
          }
        }

        // Add explicit server-side timestamp field
        formattedData.fields.serverTimestamp = {
          timestampValue: new Date().toISOString(),
        };

        try {
          const response = await fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(formattedData),
          });
          const result = await response.json();
          console.log("✅ Data saved via REST API:", result.name || result);
        } catch (error) {
          console.error("❌ REST API Save failed:", error);
        }
      };

    <!-- Spotlight tutorial overlay -->

          <button id="skipTutorialBtn" type="button" class="secondary">Skip</button>

    <script>
      (function () {
        "use strict";
        // Legacy script disabled (UI was overhauled).
        return;

        // -------- Identifiers (keep same logic as earlier version) --------
        function generateId(prefix) {
          if (window.crypto && window.crypto.randomUUID) {
            return prefix + "_" + window.crypto.randomUUID();
          }
          return (
            prefix +
            "_" +
            Date.now().toString(36) +
            "_" +
            Math.random().toString(36).slice(2, 10)
          );
        }

        const SESSION_ID = generateId("session");

        const USER_ID = (function () {
          const key = "match3UserId";
          try {
            const existing = localStorage.getItem(key);
            if (existing) return existing;
            const id = generateId("user");
            localStorage.setItem(key, id);
            return id;
          } catch (e) {
            return generateId("user");
          }
        })();

        const EXPERIMENT_CONDITION = (function () {
          const key = "match3Condition";
          const variants = ["A", "B"];
          try {
            const existing = localStorage.getItem(key);
            if (variants.includes(existing)) return existing;
            const variant = Math.random() < 0.5 ? "A" : "B";
            localStorage.setItem(key, variant);
            return variant;
          } catch (e) {
            return "A";
          }
        })();

        // -------- DOM --------
        const energyEl = document.getElementById("energyValue");
        const coinsEl = document.getElementById("coinsValue");
        const stageEl = document.getElementById("levelValue");
        const energyFillEl = document.getElementById("energyFill");
        const coinsFillEl = document.getElementById("coinsFill");

        const castleEl = document.getElementById("castle");

        const upgradeBtn = document.getElementById("upgradeBtn");
        const upgradeCostEl = document.getElementById("upgradeCostValue");
        const refillBtn = document.getElementById("refillBtn");

        const openSlotBtn = document.getElementById("openSlotBtn");
        const slotModalEl = document.getElementById("slotModal");
        const closeSlotBtn = document.getElementById("closeSlotBtn");
        const spinBtn = document.getElementById("spinBtn");
        const reelEls = [
          document.getElementById("reel0"),
          document.getElementById("reel1"),
          document.getElementById("reel2"),
        ];

        const logPreviewEl = document.getElementById("logPreview");
        const statusLineEl = document.getElementById("statusLine");

        const tutorialOverlayEl = document.getElementById("tutorialOverlay");
        const tutorialDimEl = tutorialOverlayEl
          ? tutorialOverlayEl.querySelector(".spotlight-dim")
          : null;
        const tutorialTooltipEl = document.getElementById("tutorialTooltip");
        const tutorialTextEl = document.getElementById("tutorialText");
        const skipTutorialBtn = document.getElementById("skipTutorialBtn");

        // -------- State --------
        const STORAGE_KEY_SAVE = "coinLabState_v2";
        const STORAGE_KEY_TUTORIAL = "coinLabSpotlightTutorialSeen_v1";

        const MAX_ENERGY = 10;
        const MAX_STAGE = 10;

        const STAGE_COST = [0, 60, 90, 130, 180, 240, 310, 390, 480, 580, 0];

        let energy = MAX_ENERGY;
        let coins = 0;
        let stage = 1;
        let spinIndex = 0;
        let eventsSent = 0;
        let lastSpinAtMs = null;

        let tutorialStep = 0;
        let tutorialStepShownAtMs = null;
        let tutorialRiggedSpinUsed = false;

        const SYMBOLS = [
          { name: "Coin", emoji: "💰", weight: 40, base: 40 },
          { name: "Energy", emoji: "⚡", weight: 25, base: 25 },
          { name: "Castle", emoji: "🏰", weight: 25, base: 30 },
          { name: "Bomb", emoji: "💣", weight: 10, base: -25 },
        ];

        function setStatus(message, isError = false) {
          if (!statusLineEl) return;
          statusLineEl.classList.toggle("error", !!isError);
          const span = statusLineEl.querySelector("span");
          if (span) span.textContent = message;
        }

        function upgradeCostForLevel(lvl) {
          // Level 1 upgrade cost is cheap; ramps up to Level 10.
          const base = 60;
          const cost = Math.round(base * Math.pow(lvl, 1.35));
          return Math.max(40, cost);
        }

        function persistState() {
          try {
            localStorage.setItem(
              STORAGE_KEY_SAVE,
              JSON.stringify({
                energy,
                coins,
                level,
                coinsSpentThisLevel,
                spinIndex,
                upgrades,
                totalCoinsEarned,
              })
            );
          } catch (e) {
            // ignore
          }
        }

        function loadState() {
          try {
            const raw = localStorage.getItem(STORAGE_KEY_SAVE);
            if (!raw) return;
            const s = JSON.parse(raw);
            if (!s || typeof s !== "object") return;
            if (typeof s.energy === "number") energy = s.energy;
            if (typeof s.coins === "number") coins = s.coins;
            if (typeof s.level === "number") level = s.level;
            if (typeof s.coinsSpentThisLevel === "number")
              coinsSpentThisLevel = s.coinsSpentThisLevel;
            if (typeof s.spinIndex === "number") spinIndex = s.spinIndex;
            if (typeof s.upgrades === "number") upgrades = s.upgrades;
            if (typeof s.totalCoinsEarned === "number")
              totalCoinsEarned = s.totalCoinsEarned;
          } catch (e) {
            // ignore
          }
        }

        function updateUI() {
          if (energyEl) energyEl.textContent = String(energy);
          if (coinsEl) coinsEl.textContent = String(coins);
          if (levelEl) levelEl.textContent = String(level);

          if (spinsValueEl) spinsValueEl.textContent = String(spinIndex);
          if (coinsEarnedValueEl)
            coinsEarnedValueEl.textContent = String(totalCoinsEarned);
          if (upgradesValueEl) upgradesValueEl.textContent = String(upgrades);
          if (eventsSentValueEl) eventsSentValueEl.textContent = String(eventsSent);

          const cost = upgradeCostForLevel(level);
          if (upgradeCostEl) upgradeCostEl.textContent = String(cost);

          const progressPct = Math.max(
            0,
            Math.min(100, Math.round((coinsSpentThisLevel / cost) * 100))
          );
          if (progressFillEl) progressFillEl.style.width = progressPct + "%";

          if (spinBtn) spinBtn.disabled = energy <= 0 || tutorialStep === 3;
          if (upgradeBtn)
            upgradeBtn.disabled =
              coins < cost ||
              level >= MAX_LEVEL ||
              (tutorialStep !== 0 && tutorialStep !== 3);
        }

        // Visual log hook consumed by saveToFirestore (in <head>)
        window.__appendVisualLog = function (eventObj) {
          if (!logPreviewEl) return;
          const existing = logPreviewEl.classList.contains("log-preview-empty")
            ? []
            : [];
          void existing;
          const now = new Date().toISOString();
          const line = { at: now, event: eventObj };

          // Keep a small rolling buffer in memory
          if (!window.__visualLogBuffer) window.__visualLogBuffer = [];
          window.__visualLogBuffer.push(line);
          window.__visualLogBuffer = window.__visualLogBuffer.slice(-10);

          logPreviewEl.classList.remove("log-preview-empty");
          logPreviewEl.textContent = JSON.stringify(
            window.__visualLogBuffer.map((x) => x.event),
            null,
            2
          );
        };

        function sendEvent(eventType, payload) {
          const event = {
            eventType,
            userId: USER_ID,
            sessionId: SESSION_ID,
            condition: EXPERIMENT_CONDITION,
            timestamp: new Date().toISOString(),
            ...payload,
          };

          if (typeof window.saveToFirestore === "function") {
            window.saveToFirestore(event);
            eventsSent += 1;
            updateUI();
          }
        }

        function weightedPickSymbol() {
          const total = SYMBOLS.reduce((sum, s) => sum + s.weight, 0);
          let roll = Math.random() * total;
          for (const s of SYMBOLS) {
            roll -= s.weight;
            if (roll <= 0) return s;
          }
          return SYMBOLS[0];
        }

        function computePayout(symbols) {
          const [a, b, c] = symbols;
          const names = [a.name, b.name, c.name];
          const counts = names.reduce((m, n) => {
            m[n] = (m[n] || 0) + 1;
            return m;
          }, {});
          const entries = Object.entries(counts).sort((x, y) => y[1] - x[1]);
          const top = entries[0];

          // 3-of-a-kind
          if (top[1] === 3) {
            const sym = SYMBOLS.find((s) => s.name === top[0]) || a;
            return Math.max(0, sym.base * 6);
          }

          // 2-of-a-kind
          if (top[1] === 2) {
            const sym = SYMBOLS.find((s) => s.name === top[0]) || a;
            return Math.max(0, sym.base * 2);
          }

          // No match; small consolation unless bomb present
          const hasBomb = names.includes("Bomb");
          return hasBomb ? 0 : 5;
        }

        function animateReels() {
          reelEls.forEach((el, idx) => {
            if (!el) return;
            el.classList.remove("spinning");
            // Force reflow
            void el.offsetWidth;
            el.classList.add("spinning");
            setTimeout(() => {
              el.classList.remove("spinning");
            }, 700 + idx * 60);
          });
        }

        function clearTutorialTargets() {
          if (spinBtn) spinBtn.classList.remove("tutorial-target");
          if (upgradeBtn) upgradeBtn.classList.remove("tutorial-target");
          if (startScreenEl) startScreenEl.classList.remove("pass-through");
        }

        function enterTutorialStep(stepNumber) {
          tutorialStep = stepNumber;
          tutorialStepShownAtMs = performance.now();
          clearTutorialTargets();

          if (!startScreenEl || !tutorialTitleEl || !tutorialBodyEl) return;

          const content = {
            1: {
              title: "Welcome",
              body:
                "You’ll spin a 3‑reel slot using Energy. Spins earn Coins based on matches. Let’s continue.",
              showOverlay: true,
              passThrough: false,
              buttonText: "Next",
              target: null,
            },
            2: {
              title: "Step 2: Spin",
              body:
                "Tap Spin once. This first tutorial spin is guaranteed to give enough coins to upgrade.",
              showOverlay: true,
              passThrough: true,
              buttonText: "Spin",
              target: "spin",
            },
            3: {
              title: "Step 3: Upgrade",
              body:
                "Now tap Upgrade to level up your village.",
              showOverlay: true,
              passThrough: true,
              buttonText: "Upgrade",
              target: "upgrade",
            },
          }[stepNumber];

          tutorialTitleEl.textContent = content.title;
          tutorialBodyEl.textContent = content.body;
          startGameBtn.textContent = content.buttonText;

          if (content.showOverlay) startScreenEl.classList.remove("hidden");
          if (content.passThrough) startScreenEl.classList.add("pass-through");

          if (content.target === "spin" && spinBtn) spinBtn.classList.add("tutorial-target");
          if (content.target === "upgrade" && upgradeBtn) upgradeBtn.classList.add("tutorial-target");

          // Safety net: if we reach step 3 without enough coins, grant missing coins
          if (stepNumber === 3) {
            const cost = upgradeCostForLevel(level);
            if (coins < cost) {
              const missing = cost - coins;
              coins += missing;
              totalCoinsEarned += missing;
              setStatus("Tutorial safety net: granted coins for upgrade.", false);
              sendEvent("tutorial_step", {
                stepNumber,
                timeSpentOnStep: 0,
                grantedCoins: missing,
              });
            }
          }

          // Log step entry
          sendEvent("tutorial_step", {
            stepNumber,
            timeSpentOnStep: 0,
            phase: "enter",
          });

          updateUI();
        }

        function completeTutorialStep(stepNumber) {
          if (tutorialStep !== stepNumber) return;
          const spentMs = Math.max(0, performance.now() - tutorialStepShownAtMs);
          sendEvent("tutorial_step", {
            stepNumber,
            timeSpentOnStep: Math.round(spentMs),
            phase: "complete",
          });
        }

        function nextTutorialStep() {
          if (tutorialStep === 1) {
            completeTutorialStep(1);
            enterTutorialStep(2);
            return;
          }
          if (tutorialStep === 2) {
            // Do not advance here; advance on successful spin completion
            return;
          }
          if (tutorialStep === 3) {
            // Do not advance here; advance on successful upgrade completion
            return;
          }
        }

        async function handleSpin() {
          if (energy <= 0) {
            setStatus("No energy. Refill to spin.", true);
            return;
          }
          if (tutorialStep === 3) return;

          const nowMs = performance.now();
          const reactionTimeMs =
            lastSpinAtMs === null ? 0 : Math.round(nowMs - lastSpinAtMs);
          lastSpinAtMs = nowMs;

          const energyBefore = energy;
          energy -= 1;
          spinIndex += 1;

          animateReels();
          // Small delay for "spin" feel
          await new Promise((r) => setTimeout(r, 520));

          let result = [weightedPickSymbol(), weightedPickSymbol(), weightedPickSymbol()];

          // Tutorial rig: first tutorial spin guarantees enough coins for upgrade
          if (tutorialStep === 2 && !tutorialRiggedSpinUsed) {
            tutorialRiggedSpinUsed = true;
            const coinSym = SYMBOLS.find((s) => s.name === "Coin") || SYMBOLS[0];
            result = [coinSym, coinSym, coinSym];
          }
          reelEls.forEach((el, i) => {
            if (el) el.textContent = result[i].emoji;
          });

          let coinsGained = computePayout(result);

          if (tutorialStep === 2) {
            const cost = upgradeCostForLevel(level);
            const needed = Math.max(0, cost - coins);
            if (needed > 0) {
              coinsGained = Math.max(coinsGained, needed);
            }
          }
          coins += coinsGained;
          totalCoinsEarned += coinsGained;

          setStatus(
            coinsGained > 0
              ? `Spin ${spinIndex}: +${coinsGained} coins`
              : `Spin ${spinIndex}: no payout`,
            coinsGained <= 0
          );

          sendEvent("spin_attempt", {
            spinIndex,
            energyBefore,
            resultReels: result.map((s) => s.name),
            resultReelsEmoji: result.map((s) => s.emoji),
            coinsGained,
            reactionTimeMs,
          });

          persistState();
          updateUI();

          // Event-driven tutorial progression: advance after successful spin completes
          if (tutorialStep === 2) {
            const cost = upgradeCostForLevel(level);
            if (coinsGained > 0 && coins >= cost) {
              completeTutorialStep(2);
              enterTutorialStep(3);
            }
          }
        }

        function handleUpgrade() {
          const cost = upgradeCostForLevel(level);
          if (level >= MAX_LEVEL) {
            setStatus("Max level reached.", false);
            return;
          }
          if (coins < cost) {
            setStatus("Not enough coins to upgrade.", true);
            return;
          }

          const levelBefore = level;
          coins -= cost;
          coinsSpentThisLevel += cost;
          upgrades += 1;

          // Level up when progress fills (spend cost each upgrade; 1 upgrade == level)
          level = Math.min(MAX_LEVEL, level + 1);
          coinsSpentThisLevel = 0;

          if (buildingEl) {
            buildingEl.classList.remove("shake");
            void buildingEl.offsetWidth;
            buildingEl.classList.add("shake");
          }

          setStatus(`Upgraded to Level ${level}!`, false);

          sendEvent("upgrade_attempt", {
            levelBefore,
            levelAfter: level,
            cost,
            coinsRemaining: coins,
          });

          persistState();
          updateUI();

          // Event-driven tutorial progression: advance after successful upgrade
          if (tutorialStep === 3) {
            completeTutorialStep(3);
            tutorialStep = 0;
            clearTutorialTargets();
            try {
              localStorage.setItem(STORAGE_KEY_HAS_SEEN_TUTORIAL, "1");
            } catch (e) {}
            if (startScreenEl) startScreenEl.classList.add("hidden");
            setStatus("Tutorial complete. Keep spinning and upgrading!", false);
          }

          if (level >= MAX_LEVEL) {
            sendGameEnd("max_level_reached");
          }
        }

        function handleRefill() {
          const before = energy;
          energy = MAX_ENERGY;
          setStatus("Energy refilled.", false);
          sendEvent("energy_refill", {
            energyBefore: before,
            energyAfter: energy,
          });
          persistState();
          updateUI();
        }

        function sendGameStart() {
          sendEvent("game_start", {
            initialEnergy: energy,
            initialCoins: coins,
          });
        }

        function sendGameEnd(reason) {
          sendEvent("game_end", {
            endReason: reason,
            totalSpins: spinIndex,
            totalCoinsEarned: totalCoinsEarned,
            maxLevelReached: level,
            totalUpgrades: upgrades,
            coinsRemaining: coins,
            energyRemaining: energy,
          });
        }

        // -------- Tutorial wiring --------
        function isNewUserForTutorial() {
          try {
            return localStorage.getItem(STORAGE_KEY_HAS_SEEN_TUTORIAL) !== "1";
          } catch (e) {
            return true;
          }
        }

        startGameBtn.addEventListener("click", function () {
          if (tutorialStep === 0) {
            if (startScreenEl) startScreenEl.classList.add("hidden");
            return;
          }
          nextTutorialStep();
        });

        if (skipTutorialBtn) {
          skipTutorialBtn.addEventListener("click", function () {
            // Dev/testing escape hatch
            if (tutorialStep !== 0) {
              sendEvent("tutorial_step", {
                stepNumber: tutorialStep,
                timeSpentOnStep: Math.round(
                  Math.max(0, performance.now() - tutorialStepShownAtMs)
                ),
                phase: "skipped",
              });
            }
            tutorialStep = 0;
            clearTutorialTargets();
            try {
              localStorage.setItem(STORAGE_KEY_HAS_SEEN_TUTORIAL, "1");
            } catch (e) {}
            if (startScreenEl) startScreenEl.classList.add("hidden");
            setStatus("Tutorial skipped (dev).", false);
            updateUI();
          });
        }

        // -------- Buttons --------
        spinBtn.addEventListener("click", handleSpin);
        upgradeBtn.addEventListener("click", handleUpgrade);
        refillBtn.addEventListener("click", handleRefill);
        endSessionBtn.addEventListener("click", function () {
          sendGameEnd("user_ended");
          setStatus("Session ended. You can keep interacting if needed.", false);
        });

        // -------- Boot --------
        loadState();
        updateUI();
        sendEvent("game_start", { initialEnergy: energy, initialCoins: coins });

        if (!tutorialSeen()) {
          enterTutorialStep(1);
        } else {
          endTutorial();
        }
      })();
    </script>
    <script>
      (function () {
        "use strict";

        function generateId(prefix) {
          if (window.crypto && window.crypto.randomUUID) {
            return prefix + "_" + window.crypto.randomUUID();
          }
          return (
            prefix +
            "_" +
            Date.now().toString(36) +
            "_" +
            Math.random().toString(36).slice(2, 10)
          );
        }

        const SESSION_ID = generateId("session");

        const USER_ID = (function () {
          const key = "match3UserId";
          try {
            const existing = localStorage.getItem(key);
            if (existing) return existing;
            const id = generateId("user");
            localStorage.setItem(key, id);
            return id;
          } catch (e) {
            return generateId("user");
          }
        })();

        const EXPERIMENT_CONDITION = (function () {
          const key = "match3Condition";
          const variants = ["A", "B"];
          try {
            const existing = localStorage.getItem(key);
            if (variants.includes(existing)) return existing;
            const variant = Math.random() < 0.5 ? "A" : "B";
            localStorage.setItem(key, variant);
            return variant;
          } catch (e) {
            return "A";
          }
        })();

        // DOM
        const energyEl = document.getElementById("energyValue");
        const coinsEl = document.getElementById("coinsValue");
        const stageEl = document.getElementById("levelValue");
        const energyFillEl = document.getElementById("energyFill");
        const coinsFillEl = document.getElementById("coinsFill");

        const castleEl = document.getElementById("castle");

        const upgradeBtn = document.getElementById("upgradeBtn");
        const upgradeCostEl = document.getElementById("upgradeCostValue");
        const refillBtn = document.getElementById("refillBtn");

        const openSlotBtn = document.getElementById("openSlotBtn");
        const slotModalEl = document.getElementById("slotModal");
        const closeSlotBtn = document.getElementById("closeSlotBtn");
        const spinBtn = document.getElementById("spinBtn");
        const reelEls = [
          document.getElementById("reel0"),
          document.getElementById("reel1"),
          document.getElementById("reel2"),
        ];

        const statusLineEl = document.getElementById("statusLine");
        const tutorialOverlayEl = document.getElementById("tutorialOverlay");
        const tutorialDimEl = tutorialOverlayEl
          ? tutorialOverlayEl.querySelector(".spotlight-dim")
          : null;
        const tutorialTooltipEl = document.getElementById("tutorialTooltip");
        const tutorialTextEl = document.getElementById("tutorialText");
        const skipTutorialBtn = document.getElementById("skipTutorialBtn");

        // State
        const STORAGE_KEY_SAVE = "coinLabState_v2";
        const STORAGE_KEY_TUTORIAL = "coinLabSpotlightTutorialSeen_v1";
        const MAX_ENERGY = 10;
        const MAX_STAGE = 10;
        const STAGE_COST = [0, 60, 90, 130, 180, 240, 310, 390, 480, 580, 0];

        let energy = MAX_ENERGY;
        let coins = 0;
        let stage = 1;
        let spinIndex = 0;
        let lastSpinAtMs = null;

        let tutorialStep = 0; // 1 spin, 2 close, 3 upgrade
        let tutorialStepShownAtMs = null;
        let tutorialRiggedSpinUsed = false;

        const SYMBOLS = [
          { name: "Coin", emoji: "💰", weight: 40, base: 40 },
          { name: "Energy", emoji: "⚡", weight: 25, base: 25 },
          { name: "Castle", emoji: "🏰", weight: 25, base: 30 },
          { name: "Bomb", emoji: "💣", weight: 10, base: -25 },
        ];

        function setStatus(message, isError) {
          if (!statusLineEl) return;
          statusLineEl.classList.toggle("error", !!isError);
          const span = statusLineEl.querySelector("span");
          if (span) span.textContent = message;
        }

        function sendEvent(eventType, payload) {
          const event = {
            eventType,
            userId: USER_ID,
            sessionId: SESSION_ID,
            condition: EXPERIMENT_CONDITION,
            timestamp: new Date().toISOString(),
            ...payload,
          };
          if (typeof window.saveToFirestore === "function") {
            window.saveToFirestore(event);
          }
        }

        function upgradeCostForStage(s) {
          if (s >= MAX_STAGE) return 0;
          return STAGE_COST[s] || 100;
        }

        function updateCastleStage() {
          if (!castleEl) return;
          for (let i = 1; i <= MAX_STAGE; i++) {
            castleEl.classList.remove("stage-" + i);
          }
          castleEl.classList.add("stage-" + stage);
        }

        function persistState() {
          try {
            localStorage.setItem(
              STORAGE_KEY_SAVE,
              JSON.stringify({ energy, coins, stage, spinIndex })
            );
          } catch (e) {}
        }

        function loadState() {
          try {
            const raw = localStorage.getItem(STORAGE_KEY_SAVE);
            if (!raw) return;
            const s = JSON.parse(raw);
            if (!s || typeof s !== "object") return;
            if (typeof s.energy === "number") energy = s.energy;
            if (typeof s.coins === "number") coins = s.coins;
            if (typeof s.stage === "number") stage = s.stage;
            if (typeof s.spinIndex === "number") spinIndex = s.spinIndex;
          } catch (e) {}
        }

        function updateUI() {
          if (energyEl) energyEl.textContent = String(energy);
          if (coinsEl) coinsEl.textContent = String(coins);
          if (stageEl) stageEl.textContent = String(stage);

          if (energyFillEl) {
            energyFillEl.style.width = Math.round((energy / MAX_ENERGY) * 100) + "%";
          }

          const cost = upgradeCostForStage(stage);
          if (coinsFillEl) {
            const denom = Math.max(1, cost);
            const pct = Math.max(0, Math.min(100, Math.round((coins / denom) * 100)));
            coinsFillEl.style.width = pct + "%";
          }

          if (upgradeCostEl) upgradeCostEl.textContent = String(cost);
          if (spinBtn) spinBtn.disabled = energy <= 0;
          if (openSlotBtn) openSlotBtn.disabled = energy <= 0;
          if (upgradeBtn) upgradeBtn.disabled = stage >= MAX_STAGE || coins < cost;

          updateCastleStage();
        }

        function weightedPickSymbol() {
          const total = SYMBOLS.reduce((sum, s) => sum + s.weight, 0);
          let roll = Math.random() * total;
          for (const s of SYMBOLS) {
            roll -= s.weight;
            if (roll <= 0) return s;
          }
          return SYMBOLS[0];
        }

        function computePayout(symbols) {
          const names = symbols.map((s) => s.name);
          const counts = names.reduce((m, n) => {
            m[n] = (m[n] || 0) + 1;
            return m;
          }, {});
          const entries = Object.entries(counts).sort((x, y) => y[1] - x[1]);
          const [topName, topCount] = entries[0];
          if (topCount === 3) {
            const sym = SYMBOLS.find((s) => s.name === topName) || symbols[0];
            return Math.max(0, sym.base * 6);
          }
          if (topCount === 2) {
            const sym = SYMBOLS.find((s) => s.name === topName) || symbols[0];
            return Math.max(0, sym.base * 2);
          }
          return names.includes("Bomb") ? 0 : 5;
        }

        function animateReelsFast() {
          reelEls.forEach((el) => {
            if (!el) return;
            el.classList.remove("spinning");
            void el.offsetWidth;
            el.classList.add("spinning");
            setTimeout(() => el.classList.remove("spinning"), 520);
          });
        }

        function tutorialSeen() {
          try {
            return localStorage.getItem(STORAGE_KEY_TUTORIAL) === "1";
          } catch (e) {
            return false;
          }
        }

        function setTutorialSeen() {
          try {
            localStorage.setItem(STORAGE_KEY_TUTORIAL, "1");
          } catch (e) {}
        }

        function clearTutorialHighlight() {
          [openSlotBtn, closeSlotBtn, upgradeBtn].forEach((el) => {
            if (el) el.classList.remove("tutorial-target");
          });
        }

        function positionSpotlightOn(targetEl) {
          if (!tutorialDimEl || !tutorialTooltipEl || !targetEl) return;
          const rect = targetEl.getBoundingClientRect();
          const pad = 10;
          tutorialDimEl.style.setProperty("--hole-x", rect.left - pad + "px");
          tutorialDimEl.style.setProperty("--hole-y", rect.top - pad + "px");
          tutorialDimEl.style.setProperty("--hole-w", rect.width + pad * 2 + "px");
          tutorialDimEl.style.setProperty("--hole-h", rect.height + pad * 2 + "px");

          const tooltipTop = rect.top > 180 ? rect.top - 12 : rect.bottom + 12;
          const tooltipLeft = Math.max(14, Math.min(rect.left, window.innerWidth - 14 - 320));
          tutorialTooltipEl.style.top = tooltipTop + "px";
          tutorialTooltipEl.style.left = tooltipLeft + "px";
        }

        function logTutorialStep(stepNumber, phase) {
          const spentMs =
            tutorialStepShownAtMs === null
              ? 0
              : Math.round(Math.max(0, performance.now() - tutorialStepShownAtMs));
          sendEvent("tutorial_step", { stepNumber, phase, timeSpentOnStep: spentMs });
        }

        function enterTutorialStep(stepNumber) {
          tutorialStep = stepNumber;
          tutorialStepShownAtMs = performance.now();
          clearTutorialHighlight();
          if (!tutorialOverlayEl || !tutorialTextEl) return;
          tutorialOverlayEl.classList.remove("hidden");

          if (stepNumber === 1) {
            tutorialTextEl.textContent = "Tap SPIN to open the slot and spin once.";
            openSlotBtn.classList.add("tutorial-target");
            positionSpotlightOn(openSlotBtn);
          } else if (stepNumber === 2) {
            tutorialTextEl.textContent = "Now close the slot machine.";
            closeSlotBtn.classList.add("tutorial-target");
            positionSpotlightOn(closeSlotBtn);
          } else if (stepNumber === 3) {
            tutorialTextEl.textContent = "Upgrade your castle to progress.";
            upgradeBtn.classList.add("tutorial-target");
            positionSpotlightOn(upgradeBtn);
          }

          logTutorialStep(stepNumber, "start");
        }

        function completeTutorialStep(stepNumber) {
          if (tutorialStep !== stepNumber) return;
          logTutorialStep(stepNumber, "end");
        }

        function endTutorial() {
          tutorialStep = 0;
          tutorialStepShownAtMs = null;
          clearTutorialHighlight();
          if (tutorialOverlayEl) tutorialOverlayEl.classList.add("hidden");
          setTutorialSeen();
        }

        function openSlotModal() {
          if (!slotModalEl) return;
          slotModalEl.classList.remove("hidden");
          sendEvent("ui_navigation", { action: "open_slot" });
        }

        function closeSlotModal() {
          if (!slotModalEl) return;
          slotModalEl.classList.add("hidden");
          sendEvent("ui_navigation", { action: "close_slot" });
          if (tutorialStep === 2) {
            completeTutorialStep(2);
            enterTutorialStep(3);
          }
        }

        async function runSpin(triggeredByTutorial) {
          if (energy <= 0) {
            setStatus("Out of energy. Refill to spin.", true);
            return;
          }

          const nowMs = performance.now();
          const reactionTimeMs =
            lastSpinAtMs === null ? 0 : Math.round(nowMs - lastSpinAtMs);
          lastSpinAtMs = nowMs;

          const energyBefore = energy;
          energy -= 1;
          spinIndex += 1;

          animateReelsFast();
          await new Promise((r) => setTimeout(r, 360));

          let tutorialRigged = false;
          let result = [weightedPickSymbol(), weightedPickSymbol(), weightedPickSymbol()];

          if (tutorialStep === 1 && !tutorialRiggedSpinUsed) {
            tutorialRiggedSpinUsed = true;
            tutorialRigged = true;
            const coinSym = SYMBOLS.find((s) => s.name === "Coin") || SYMBOLS[0];
            result = [coinSym, coinSym, coinSym];
          }

          reelEls.forEach((el, i) => {
            if (el) el.textContent = result[i].emoji;
          });

          let coinsWon = computePayout(result);
          if (triggeredByTutorial && tutorialRigged) {
            const cost = upgradeCostForStage(stage);
            const needed = Math.max(0, cost - coins);
            coinsWon = Math.max(coinsWon, needed);
          }

          coins += coinsWon;
          setStatus(coinsWon > 0 ? `+${coinsWon} coins!` : "No payout.", coinsWon <= 0);

          sendEvent("spin_result", {
            spinIndex,
            energyBefore,
            resultReels: result.map((s) => s.name),
            resultReelsEmoji: result.map((s) => s.emoji),
            coinsWon,
            reactionTimeMs,
            tutorialRigged,
          });

          persistState();
          updateUI();

          if (tutorialStep === 1) {
            completeTutorialStep(1);
            enterTutorialStep(2);
          }
        }

        function handleUpgrade() {
          const cost = upgradeCostForStage(stage);
          if (stage >= MAX_STAGE) return;

          if (coins < cost && tutorialStep === 3) {
            const missing = cost - coins;
            if (missing > 0) coins += missing;
          }

          if (coins < cost) {
            setStatus("Not enough coins to upgrade.", true);
            return;
          }

          const before = stage;
          coins -= cost;
          stage = Math.min(MAX_STAGE, stage + 1);

          const wrap = castleEl ? castleEl.closest(".castle-wrap") : null;
          if (wrap) {
            wrap.classList.remove("castle-upgraded");
            void wrap.offsetWidth;
            wrap.classList.add("castle-upgraded");
            setTimeout(() => wrap.classList.remove("castle-upgraded"), 520);
          }

          sendEvent("village_upgrade", {
            stageBefore: before,
            stageAfter: stage,
            cost,
            coinsRemaining: coins,
          });

          persistState();
          updateUI();

          if (tutorialStep === 3) {
            completeTutorialStep(3);
            endTutorial();
          }
        }

        function handleRefill() {
          const before = energy;
          energy = MAX_ENERGY;
          sendEvent("energy_refill", { energyBefore: before, energyAfter: energy });
          persistState();
          updateUI();
        }

        // Wiring
        openSlotBtn.addEventListener("click", async function () {
          openSlotModal();
          if (tutorialStep === 1) {
            await runSpin(true);
          }
        });
        closeSlotBtn.addEventListener("click", closeSlotModal);
        spinBtn.addEventListener("click", function () {
          runSpin(false);
        });
        upgradeBtn.addEventListener("click", handleUpgrade);
        refillBtn.addEventListener("click", handleRefill);

        if (skipTutorialBtn) {
          skipTutorialBtn.addEventListener("click", function () {
            if (tutorialStep) logTutorialStep(tutorialStep, "skip");
            endTutorial();
            updateUI();
          });
        }

        window.addEventListener("resize", function () {
          if (tutorialStep === 1) positionSpotlightOn(openSlotBtn);
          if (tutorialStep === 2) positionSpotlightOn(closeSlotBtn);
          if (tutorialStep === 3) positionSpotlightOn(upgradeBtn);
        });

        // Boot
        loadState();
        updateUI();
        sendEvent("game_start", { initialEnergy: energy, initialCoins: coins });
        if (!tutorialSeen()) {
          enterTutorialStep(1);
        } else {
          endTutorial();
        }
      })();
    </script>
